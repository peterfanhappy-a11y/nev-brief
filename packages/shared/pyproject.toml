[project]
name = "nev-shared"
version = "0.1.0"
description = "共享工具库 — db / logger / retry / config"
requires-python = ">=3.12"
dependencies = [
    "nev-contracts",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.1",
    "tenacity>=8.3",
    "supabase>=2.5",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nev_shared"]
