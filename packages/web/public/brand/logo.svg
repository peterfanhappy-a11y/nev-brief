<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <!-- v3: 棱镜三角光谱，呼应 "visions" —— 光进来分成彩色出去 -->
  <g transform="translate(4,4)">
    <!-- 白光入射 -->
    <line x1="0" y1="20" x2="10" y2="20" stroke="#94A3B8" stroke-width="2"/>
    <!-- 棱镜三角 -->
    <polygon points="20,0 40,40 0,40" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 折射三色 -->
    <line x1="28" y1="20" x2="44" y2="10" stroke="#EF4444" stroke-width="2"/>
    <line x1="28" y1="20" x2="46" y2="20" stroke="#10B981" stroke-width="2"/>
    <line x1="28" y1="20" x2="44" y2="30" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <!-- 字标 -->
  <text x="60" y="33" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="2" fill="#0F172A">AIVIZENS</text>
</svg>
