<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <!-- v1: 几何 A 三角 + 无衬线字标 -->
  <defs>
    <linearGradient id="v1grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- A 图标：等腰三角 + 底横 -->
  <g transform="translate(4,4)">
    <polygon points="20,0 40,40 0,40" fill="url(#v1grad)"/>
    <rect x="10" y="24" width="20" height="4" fill="#fff"/>
  </g>
  <!-- 字标 -->
  <text x="56" y="33" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="2" fill="#0F172A">AIVIZENS</text>
</svg>
