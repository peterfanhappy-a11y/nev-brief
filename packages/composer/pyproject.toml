[project]
name = "nev-composer"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "nev-contracts",
    "nev-shared",
    "nev-pipeline",   # 复用 entity_dict / canonicalize_brands
    "jinja2>=3.1",
    "html2text>=2024.0",
    "psycopg[binary]>=3.1",
    "pydantic>=2.0",
    "structlog",
]

[tool.uv.sources]
nev-contracts = { workspace = true }
nev-shared    = { workspace = true }
nev-pipeline  = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
