# 25 个 MVP 信源配置 — spec §5.1
# 修改后运行: uv run python -m nev_crawler.source_loader sync

sources:
  # === 国内综合媒体 (8) ===
  - name: "36氪汽车"
    type: rss
    url: "https://36kr.com/feed-newsflash"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "虎嗅汽车"
    type: rss
    url: "https://www.huxiu.com/rss/4.xml"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "未来汽车日报"
    type: rss
    url: "https://auto-time.36kr.com/feed"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "晚点 Auto"
    type: html
    url: "https://www.latepost.com/news/auto"
    authority: 9
    locale: zh
    category: media
    enabled: false  # TODO: 原 URL 已 404，需查 latepost.com 新栏目结构
    crawl_cron: "0 22 * * *"
    extra:
      list_selector: "article.news-item"
      title_selector: "h3 a"
      link_selector: "h3 a"
      link_attr: "href"
      time_selector: ".publish-time"

  - name: "电动星球 News"
    type: rsshub
    url: "/wechat/ebrun/dianxing"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "0 12,22 * * *"

  - name: "智驾网"
    type: rss
    url: "https://www.zhijiawang.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "车东西"
    type: rss
    url: "https://www.chedongxi.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "量子位"
    type: rss
    url: "https://www.qbitai.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  # === 国内垂类网站 (3) ===
  - name: "汽车之家资讯"
    type: html
    url: "https://www.autohome.com.cn/news/"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      # debug_html.py 验证: 60x 链接父容器为 ul.article
      list_selector: "ul.article > li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".fn-right"

  - name: "懂车帝资讯"
    type: nextjs_json
    url: "https://www.dongchedi.com/news"
    authority: 7
    locale: zh
    category: media
    enabled: false  # ⚠️ 合规硬约束：dongchedi.com/robots.txt 明确 Disallow: / (禁止所有爬虫)
    crawl_cron: "30 22 * * *"
    extra:
      # __NEXT_DATA__ JSON 路径已验证，但 robots.txt 禁止访问，不能启用
      json_path: "props.pageProps.staticData.news"
      title_field: "title"
      id_field: "unique_id_str"
      url_template: "https://www.dongchedi.com/article/{id}"
      published_field: "publish_time"

  - name: "车质网投诉"
    type: html
    url: "https://www.12365auto.com/news/index.shtml"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      # debug_html.py 验证: 20x 链接父容器为 div.news_nr
      list_selector: "div.news_nr"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".time"

  # === 国内官方/协会 (3) ===
  - name: "乘联会 CPCA 周报"
    type: html
    url: "https://www.cpcaauto.com/news.php?types=csjd"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 25x div.cat_list 是周度报告列表
      list_selector: "div.cat_list"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".time"
      # 乘联会拒绝 NEV-Brief-Bot UA (403)，用浏览器伪装绕过
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120 Safari/537.36"

  - name: "中汽协 CAAM"
    type: html
    url: "http://www.caam.org.cn/chn/8/cate_82/list_1.html"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 27x [class*='article'] 是行业动态文章
      list_selector: "[class*='article']"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

  - name: "中汽协 产销数据"
    type: html
    url: "http://www.caam.org.cn/chn/5/cate_39/list_1.html"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # cate_39 = 国内产销数据（NEV 月度销量来源）
      list_selector: "[class*='article']"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

  - name: "工信部新车目录"
    type: html
    url: "https://www.miit.gov.cn/jgsj/zbys/qcgy/index.html"
    authority: 10
    locale: zh
    category: official
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 7x 链接父容器为 ul.lmy_main_tj
      list_selector: "ul.lmy_main_tj li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

