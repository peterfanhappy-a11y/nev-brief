# 25 个 MVP 信源配置 — spec §5.1
# 修改后运行: uv run python -m nev_crawler.source_loader sync

sources:
  # === 国内综合媒体 (8) ===
  - name: "36氪汽车"
    type: rss
    url: "https://36kr.com/feed-newsflash"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "虎嗅汽车"
    type: rss
    url: "https://www.huxiu.com/rss/4.xml"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "未来汽车日报"
    type: rss
    url: "https://auto-time.36kr.com/feed"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "晚点 Auto"
    type: html
    url: "https://www.latepost.com/news/auto"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"
    extra:
      list_selector: "article.news-item"
      title_selector: "h3 a"
      link_selector: "h3 a"
      link_attr: "href"
      time_selector: ".publish-time"

  - name: "电动星球 News"
    type: rsshub
    url: "/wechat/ebrun/dianxing"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "0 12,22 * * *"

  - name: "智驾网"
    type: rss
    url: "https://www.zhijiawang.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "车东西"
    type: rss
    url: "https://www.chedongxi.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "量子位"
    type: rss
    url: "https://www.qbitai.com/feed"
