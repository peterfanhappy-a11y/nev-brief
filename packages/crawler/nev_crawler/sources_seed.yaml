    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  # === 国内垂类网站 (3) ===
  - name: "汽车之家资讯"
    type: html
    url: "https://www.autohome.com.cn/news/"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      list_selector: ".article-pic-list li"
      title_selector: ".article-content h3 a"
      link_selector: ".article-content h3 a"
      link_attr: "href"
      time_selector: ".fn-clear .fn-right"

  - name: "懂车帝资讯"
    type: html
    url: "https://www.dongchedi.com/news"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      list_selector: "[class*='card_box']"
      title_selector: "[class*='card_title']"
      link_selector: "a"
      link_attr: "href"
      time_selector: "[class*='card_time']"

  - name: "车质网投诉"
    type: html
    url: "https://www.12365auto.com/news/index.shtml"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      list_selector: ".newsList li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".time"

  # === 国内官方/协会 (3) ===
