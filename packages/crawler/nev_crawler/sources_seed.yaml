# 25 个 MVP 信源配置 — spec §5.1
# 修改后运行: uv run python -m nev_crawler.source_loader sync

sources:
  # === NEV-pure 媒体（高质量信源 — 添加于 2026-06-04 用户反馈后）===
  - name: "第一电动"
    type: html
    url: "https://www.d1ev.com/news"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"
    extra:
      # subagent 验证：20 条/页，server-rendered，覆盖电池/智驾/座舱/OTA
      list_selector: ".article--wraped"
      title_selector: ".article_p a"
      link_selector: ".article_p a"
      link_attr: "href"

  - name: "第一电动技术"
    type: html
    url: "https://www.d1ev.com/news/jishu"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"
    extra:
      # 同模板，technical 子频道 — 重点电池/智驾/OTA/三电
      list_selector: ".article--wraped"
      title_selector: ".article_p a"
      link_selector: ".article_p a"
      link_attr: "href"

  # === 国内综合媒体 (8) ===
  - name: "36氪汽车"
    type: rss
    url: "https://36kr.com/feed-newsflash"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  - name: "虎嗅汽车"
    type: rss
    url: "https://www.huxiu.com/rss/4.xml"
    authority: 8
    locale: zh
    category: media
    enabled: false  # 2026-06-08 re-audit: RSS timeout/dead; huxiu has no auto-specific channel feed
    crawl_cron: "0 22 * * *"

  - name: "未来汽车日报"
    type: rss
    url: "https://auto-time.36kr.com/feed"
    authority: 9
    locale: zh
    category: media
    enabled: false  # 2026-06-08 re-audit: 404 (site dead). 36氪汽车 RSS 已覆盖大部分内容
    crawl_cron: "0 22 * * *"

  - name: "晚点 LatePost"
    type: html
    url: "https://www.latepost.com/"
    authority: 9
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"
    extra:
      # 2026-06-08 re-audit: /news/auto 不存在；首页 Newsletter-li 是 server-rendered
      # 3 篇/次，混合主题（NEV-relevance 过滤会丢非 NEV 文章）
      list_selector: "div.Newsletter-li"
      title_selector: "a span.Newsletter-li-title"
      link_selector: "a"
      link_attr: "href"

  - name: "电动星球 News"
    type: rsshub
    url: "/wechat/ebrun/dianxing"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "0 12,22 * * *"

  - name: "智驾网"
    type: rss
    url: "https://www.zhijiawang.com/feed"
    authority: 7
    locale: zh
    category: media
    enabled: false  # 2026-06-08 re-audit: socket connection closed unexpectedly; 整个域名 unreachable
    crawl_cron: "0 22 * * *"

  - name: "车东西"
    type: html
    url: "https://www.chedongxi.com/"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"
    extra:
      # 2026-06-08 改 RSS → HTML scrape：原 /feed HTTP 500。首页 top-img-title-list
      # 是 server-rendered 4 篇头条（理想/小鹏/宁德/ 自驾），quality > quantity
      list_selector: "ul.top-img-title-list > li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"

  - name: "量子位"
    type: rss
    url: "https://www.qbitai.com/feed"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "0 22 * * *"

  # === 国内垂类网站 (3) ===
  - name: "汽车之家资讯"
    type: html
    url: "https://www.autohome.com.cn/news/"
    authority: 7
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      # debug_html.py 验证: 60x 链接父容器为 ul.article
      list_selector: "ul.article > li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".fn-right"

  - name: "懂车帝资讯"
    type: nextjs_json
    url: "https://www.dongchedi.com/news"
    authority: 7
    locale: zh
    category: media
    enabled: false  # ⚠️ 合规硬约束：dongchedi.com/robots.txt 明确 Disallow: / (禁止所有爬虫)
    crawl_cron: "30 22 * * *"
    extra:
      # __NEXT_DATA__ JSON 路径已验证，但 robots.txt 禁止访问，不能启用
      json_path: "props.pageProps.staticData.news"
      title_field: "title"
      id_field: "unique_id_str"
      url_template: "https://www.dongchedi.com/article/{id}"
      published_field: "publish_time"

  - name: "车质网投诉"
    type: html
    url: "https://www.12365auto.com/news/index.shtml"
    authority: 8
    locale: zh
    category: media
    crawl_cron: "30 22 * * *"
    extra:
      # debug_html.py 验证: 20x 链接父容器为 div.news_nr
      list_selector: "div.news_nr"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".time"

  # === 国内官方/协会 (3) ===
  - name: "乘联会 CPCA 周报"
    type: html
    url: "https://www.cpcaauto.com/news.php?types=csjd"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 25x div.cat_list 是周度报告列表
      list_selector: "div.cat_list"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".time"
      # 乘联会拒绝 NEV-Brief-Bot UA (403)，用浏览器伪装绕过
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120 Safari/537.36"

  - name: "中汽协 CAAM"
    type: html
    url: "http://www.caam.org.cn/chn/8/cate_82/list_1.html"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 27x [class*='article'] 是行业动态文章
      list_selector: "[class*='article']"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

  - name: "中汽协 产销数据"
    type: html
    url: "http://www.caam.org.cn/chn/5/cate_39/list_1.html"
    authority: 10
    locale: zh
    category: association
    crawl_cron: "0 23 * * *"
    extra:
      # cate_39 = 国内产销数据（NEV 月度销量来源）
      list_selector: "[class*='article']"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

  - name: "工信部新车目录"
    type: html
    url: "https://www.miit.gov.cn/jgsj/zbys/qcgy/index.html"
    authority: 10
    locale: zh
    category: official
    crawl_cron: "0 23 * * *"
    extra:
      # debug_html.py 验证: 7x 链接父容器为 ul.lmy_main_tj
      list_selector: "ul.lmy_main_tj li"
      title_selector: "a"
      link_selector: "a"
      link_attr: "href"
      time_selector: ".date"

